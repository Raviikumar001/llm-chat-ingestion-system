services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ollive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - path: ../../.env
        required: false
      - path: ../../.env.local
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ollive
      API_PORT: 3001
      LOG_PREVIEW_MAX_CHARS: 500
      REQUEST_TIMEOUT_MS: 30000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "pnpm --filter @ollive/api db:migrate && pnpm --filter @ollive/api dev"]

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      WEB_PORT: 3000
    depends_on:
      - api
    command: ["sh", "-c", "cd /app/apps/web && pnpm dev --hostname 0.0.0.0 --port 3000"]

volumes:
  postgres_data:
