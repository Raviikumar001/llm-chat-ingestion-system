version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ollive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ollive
      - API_PORT=3001
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-cerebras}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-oss-120b}
      - LOG_PREVIEW_MAX_CHARS=500
      - REQUEST_TIMEOUT_MS=30000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "pnpm --filter api db:migrate && pnpm --filter api dev"]

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - WEB_PORT=3000
    depends_on:
      - api
    command: ["sh", "-c", "pnpm --filter web dev"]

volumes:
  postgres_data:
